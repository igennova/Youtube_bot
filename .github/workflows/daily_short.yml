name: Daily YouTube Short

on:
  schedule:
    - cron: "0 10 * * *"
    - cron: "30 23 * * *" 
  workflow_dispatch:
    inputs:
      channel:
        description: "Channel preset (ghost_stories, facts, school_story, etc.)"
        required: true
        default: "ghost_stories"
      topic:
        description: "Optional topic hint"
        required: false
        default: ""

env:
  GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
  DEAPI_TOKEN: ${{ secrets.DEAPI_TOKEN }}
  YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
  YT_CLIENT_SECRET_VALUE: ${{ secrets.YT_CLIENT_SECRET_VALUE }}
  YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
  IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
  IG_ACCOUNT_ID: ${{ secrets.IG_ACCOUNT_ID }}
  EDGE_TTS_VOICE: "en-US-ChristopherNeural"

permissions:
  contents: write

jobs:
  generate-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Python deps
        run: pip install -r requirements.txt

      # Restore story history from previous runs (prevents repeats)
      - name: Restore history cache
        uses: actions/cache@v4
        with:
          path: output/history/
          key: story-history-${{ github.event.inputs.channel || 'ghost_stories' }}

      - name: Generate & upload Short
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          CHANNEL="${{ github.event.inputs.channel || 'ghost_stories' }}"
          TOPIC="${{ github.event.inputs.topic || '' }}"
          IG_FLAG=""
          if [ -n "$IG_ACCESS_TOKEN" ] && [ -n "$IG_ACCOUNT_ID" ]; then
            IG_FLAG="--instagram"
          fi

          if [ -n "$TOPIC" ]; then
            python scripts/run_short.py --channel "$CHANNEL" --topic "$TOPIC" --upload --privacy public $IG_FLAG
          else
            python scripts/run_short.py --channel "$CHANNEL" --upload --privacy public $IG_FLAG
          fi

      # Save history so next run knows what stories already exist
      - name: Save history cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: output/history/
          key: story-history-${{ github.event.inputs.channel || 'ghost_stories' }}-${{ github.run_id }}

      - name: Save artifacts (script + video)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: short-${{ github.run_id }}
          path: output/runs/
          retention-days: 7
